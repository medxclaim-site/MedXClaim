# Cloudflare Pages Configuration
# For MedXClaim React + Vite project
# Note: Build settings are configured in Cloudflare Pages dashboard, not here

name = "medxclaim"
type = "javascript"
compatibility_date = "2024-04-12"

# Build configuration
[build]
command = "npm run build"
cwd = "."
watch_paths = ["src/**/*.jsx", "src/**/*.js", "package.json"]

# Pages deployment
[pages]
name = "medxclaim"

# Production environment
[env.production.vars]
VITE_API_BASE = "https://medxclaim.com"
