# Netlify Configuration for MedXClaim
# Production deployment configuration with medxclaim.com domain

[build]
command = "npm ci && npm run build"
publish = "dist"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "18.16.0"
NPM_VERSION = "9.8.0"

[context.production]
command = "npm ci && npm run build"
publish = "dist"

[context.production.environment]
NODE_VERSION = "18.16.0"

[context.branch-deploy]
command = "npm ci && npm run build"
publish = "dist"

[context.branch-deploy.environment]
NODE_VERSION = "18.16.0"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

[[headers]]
for = "/*"
[headers.values]
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "SAMEORIGIN"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
for = "/assets/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/(js|css)/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.html"
[headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate, no-cache"

[[headers]]
for = "/index.html"
[headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate, no-cache"

[[headers]]
for = "/*.svg"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.{woff,woff2,ttf,otf,eot}"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.json"
[headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"

[[redirects]]
from = "/404"
to = "/index.html"
status = 404

[[redirects]]
from = "/500"
to = "/index.html"
status = 500
